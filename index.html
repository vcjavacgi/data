<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>中国出口智能分析仪表盘（大陆优化最终版）</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    body { font-family: 'Microsoft YaHei', system-ui; }
    .card { transition: all 0.3s; }
    .card:hover { transform: translateY(-5px); box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1); }
  </style>
</head>
<body class="bg-gray-950 text-gray-200 min-h-screen">
  <div class="max-w-6xl mx-auto p-6">
    <div class="text-center mb-10">
      <h1 class="text-4xl font-bold text-emerald-400 flex items-center justify-center gap-3">
        <i class="fas fa-chart-line"></i> 中国出口智能分析仪表盘
      </h1>
      <p class="text-emerald-400 mt-2">大陆优化 · 7大代理池 · 价格失败也不影响分析</p>
    </div>

    <!-- 数据源链接 -->
    <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-10">
      <a href="https://x.com/RobinSeun/status/2034209232623464546?s=20" target="_blank" class="card bg-gray-900 p-6 rounded-2xl border border-gray-800 hover:border-emerald-500">
        <h3 class="font-semibold">🔗 上篇：国家级+国际组织数据</h3>
      </a>
      <a href="https://x.com/RobinSeun/status/2034833298737045918" target="_blank" class="card bg-gray-900 p-6 rounded-2xl border border-gray-800 hover:border-emerald-500">
        <h3 class="font-semibold">🔗 下篇：行业专项+各国数据</h3>
      </a>
      <a href="https://www.notion.so/aigc01/32872eda845880ae8562d4f1f496be73" target="_blank" class="card bg-gray-900 p-6 rounded-2xl border border-gray-800 hover:border-emerald-500">
        <h3 class="font-semibold">🔗 Notion 数据地图总表</h3>
      </a>
    </div>

    <div class="text-center mb-12">
      <button onclick="generateAnalysis()" id="btn"
        class="bg-emerald-500 hover:bg-emerald-600 text-white text-2xl font-bold px-16 py-6 rounded-3xl shadow-lg flex items-center gap-4 mx-auto">
        <i class="fas fa-bolt"></i>
        一键生成最新出口分析 & 推荐股票
      </button>
    </div>

    <div id="result" class="hidden">
      <div class="bg-gray-900 rounded-3xl p-8 border border-gray-800">
        <!-- 宏观数据（每月改这里） -->
        <div class="mb-10">
          <h2 class="text-2xl font-bold mb-4 flex items-center gap-2"><i class="fas fa-globe"></i> 最新宏观出口形势（2026年1-2月 海关总署）</h2>
          <div class="grid grid-cols-2 md:grid-cols-4 gap-6 text-sm">
            <div class="bg-gray-800 p-5 rounded-2xl"><strong>进出口总额</strong><br>7.73万亿元 <span class="text-emerald-400">+18.3%</span></div>
            <div class="bg-gray-800 p-5 rounded-2xl"><strong>出口总额</strong><br>4.62万亿元 <span class="text-emerald-400">+19.2%</span></div>
            <div class="bg-gray-800 p-5 rounded-2xl"><strong>机电产品出口</strong><br>2.89万亿元 <span class="text-emerald-400">+24.3%</span></div>
            <div class="bg-gray-800 p-5 rounded-2xl"><strong>集成电路出口</strong><br>+68.9%（增长最猛）</div>
          </div>
        </div>

        <h2 class="text-2xl font-bold mb-4 flex items-center gap-2"><i class="fas fa-search"></i> 本期出口判断结果</h2>
        <div id="industryResult" class="bg-gray-800 p-6 rounded-2xl mb-10"></div>

        <h2 class="text-2xl font-bold mb-4">📈 对应股票实时行情</h2>
        <div id="stockTable" class="overflow-x-auto"></div>

        <h2 class="text-2xl font-bold mt-10 mb-4 flex items-center gap-2"><i class="fas fa-trophy"></i> 本期最有利股票推荐</h2>
        <div id="recommend" class="grid grid-cols-1 md:grid-cols-3 gap-6"></div>

        <div class="mt-10 bg-gray-950 p-6 rounded-2xl border border-emerald-900">
          <h3 class="font-bold text-lg mb-3">📋 分析师简报</h3>
          <p id="analysisText" class="text-gray-300 leading-relaxed"></p>
        </div>
      </div>
    </div>
  </div>

  <script>
    // 🔥 每月在这里更新一次出口数据即可（从海关总署复制）
    const exportCategories = [
      { industry: "集成电路", growth: 68.9, valueDesc: "3046.7亿元", subIndustry: "高端芯片/半导体", stocks: [{ name: "中芯国际", ticker: "0981.HK", reason: "集成电路出口增长最猛核心标的" }] },
      { industry: "汽车", growth: 63.1, valueDesc: "1892.2亿元", subIndustry: "新能源汽车", stocks: [
        { name: "比亚迪", ticker: "1211.HK", reason: "NEV出口翻倍龙头" },
        { name: "宁德时代", ticker: "300750.SZ", reason: "电池全球第一，出口链核心" },
        { name: "吉利汽车", ticker: "0175.HK", reason: "海外布局加速" },
        { name: "长城汽车", ticker: "2333.HK", reason: "坦克/哈弗系列追赶" }
      ]},
      { industry: "塑料制品", growth: 25.7, valueDesc: "190.4亿美元", subIndustry: "塑料产品", stocks: [{ name: "比亚迪", ticker: "1211.HK", reason: "多元化出口受益" }] }
    ];

    // 2026最新7大代理池（新增亚洲节点，针对大陆优化）
    const proxies = [
      'https://api.allorigins.win/raw?url=',
      'https://corsproxy.io/?',
      'https://api.codetabs.com/v1/proxy?quest=',
      'https://thingproxy.freeboard.io/fetch/',
      'https://cors.x2u.in/',
      'https://proxy.cors.sh/',
      'https://api.cors.lol/'
    ];

    async function fetchWithProxy(yahooUrl) {
      for (let base of proxies) {
        for (let attempt = 1; attempt <= 5; attempt++) {
          try {
            const proxyUrl = base + encodeURIComponent(yahooUrl);
            const res = await fetch(proxyUrl);
            if (!res.ok) throw new Error();
            const data = await res.json();
            const contents = data.contents || data;
            return typeof contents === 'string' ? JSON.parse(contents) : contents;
          } catch (e) {
            if (attempt === 5) break;
            await new Promise(r => setTimeout(r, 1000));
          }
        }
      }
      throw new Error('所有代理失败');
    }

    async function generateAnalysis() {
      const btn = document.getElementById('btn');
      btn.innerHTML = `<i class="fas fa-spinner fa-spin"></i> 正在分析...`;
      btn.disabled = true;

      const topCategory = exportCategories.reduce((max, cat) => cat.growth > max.growth ? cat : max);

      // 显示行业判断（永远正常显示）
      document.getElementById('industryResult').innerHTML = `
        <div class="text-xl font-bold text-emerald-400">出口增长最猛行业：${topCategory.industry}</div>
        <div class="text-2xl mt-2">${topCategory.valueDesc}（+${topCategory.growth}%）</div>
        <div class="text-lg mt-4">细分：${topCategory.subIndustry}</div>
        <p class="text-sm text-gray-400 mt-4">（数据来源：海关总署2026年1-2月）</p>
      `;

      let quotes = [];
      let priceFailed = false;
      try {
        const symbols = topCategory.stocks.map(s => s.ticker).join(',');
        const yahooUrl = `https://query1.finance.yahoo.com/v6/finance/quote?symbols=${symbols}`;
        const data = await fetchWithProxy(yahooUrl);
        quotes = data.quoteResponse.result;
      } catch (e) {
        priceFailed = true;
      }

      // 渲染表格和推荐（价格失败也不崩溃）
      let tableHTML = `<table class="w-full text-left border-collapse"><thead class="bg-gray-800"><tr><th class="p-4">股票</th><th class="p-4">最新价</th><th class="p-4">涨跌幅</th><th class="p-4">推荐逻辑</th></tr></thead><tbody>`;
      let recommendHTML = '';

      topCategory.stocks.forEach((stock, i) => {
        const q = quotes[i] || {};
        const price = priceFailed ? '暂不可用' : (q.regularMarketPrice?.toFixed(2) || 'N/A');
        const change = priceFailed ? '0' : (q.regularMarketChangePercent?.toFixed(2) || '0');
        const color = parseFloat(change) > 0 ? 'text-emerald-400' : 'text-red-400';

        tableHTML += `<tr class="border-t border-gray-700"><td class="p-4 font-medium">${stock.name} (${stock.ticker})</td><td class="p-4">${price}</td><td class="p-4 ${color}">${change}%</td><td class="p-4 text-gray-400 text-sm">${stock.reason}</td></tr>`;

        if (i < 3) {
          recommendHTML += `<div class="card bg-gray-800 p-6 rounded-2xl border border-gray-700"><div class="flex justify-between items-start"><div><div class="text-xl font-bold">${stock.name}</div><div class="text-3xl mt-2">${price}</div></div><div class="${color} text-3xl font-bold">${change}%</div></div><p class="mt-6 text-sm text-gray-400">${stock.reason}</p></div>`;
        }
      });
      tableHTML += '</tbody></table>';

      document.getElementById('stockTable').innerHTML = tableHTML;
      document.getElementById('recommend').innerHTML = recommendHTML;

      document.getElementById('analysisText').innerHTML = priceFailed 
        ? `根据2026年1-2月海关数据，${topCategory.industry}出口增长${topCategory.growth}%（细分${topCategory.subIndustry}），是当前最猛领域。<br><span class="text-yellow-400">股价暂不可用（大陆网络限制），建议打开VPN或切换手机热点后重试</span>`
        : `根据2026年1-2月海关数据，${topCategory.industry}出口增长${topCategory.growth}%（细分${topCategory.subIndustry}），是当前最猛领域。对应股票将直接受益！`;

      document.getElementById('result').classList.remove('hidden');

      btn.innerHTML = `<i class="fas fa-bolt"></i> 一键生成最新出口分析 & 推荐股票`;
      btn.disabled = false;
    }
  </script>
</body>
</html>
