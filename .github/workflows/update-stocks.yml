name: Update Stock Data

on:
  schedule:
    - cron: '0 1 * * *'   # 每天北京时间上午 9 点自动更新
  workflow_dispatch:      # 支持手动触发

permissions:
  contents: write         # 必须加这行，才能自动提交文件

jobs:
  update:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true   # 强制 Node 24，彻底消灭警告

    steps:
      - uses: actions/checkout@v6
      
      - name: Set up Python 3.12
        uses: actions/setup-python@v6      # 升级到最新 v6（已支持 Node 24）
        with:
          python-version: '3.12'           # 显式指定，消灭第二个警告
      
      - name: Install requests
        run: pip install requests
      
      - name: Fetch latest stock prices
        run: python fetch-stocks.py
      
      - name: Commit & Push data.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          if git diff --staged --quiet; then
            echo "✅ No changes to commit"
          else
            git commit -m "🤖 自动更新股票数据 $(date '+%Y-%m-%d %H:%M:%S')"
            git push
            echo "✅ data.json 已成功提交！"
          fi
